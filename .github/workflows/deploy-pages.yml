name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: toolkit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: toolkit/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          NEXT_PUBLIC_SITE_URL: https://pinnacletoolbox.com
          NEXT_PUBLIC_ADSENSE_CLIENT: ca-pub-1014488780102797
          NEXT_PUBLIC_ADSENSE_ENABLED: ${{ vars.ADSENSE_ENABLED || 'false' }}
          NEXT_PUBLIC_ADSENSE_SLOT_BANNER: ${{ vars.ADSENSE_SLOT_BANNER || '' }}
          NEXT_PUBLIC_ADSENSE_SLOT_INLINE: ${{ vars.ADSENSE_SLOT_INLINE || '' }}
          NEXT_PUBLIC_ADSENSE_SLOT_SIDEBAR: ${{ vars.ADSENSE_SLOT_SIDEBAR || '' }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: toolkit/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
